packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  '@tarojs/binding': true
  core-js: true
  core-js-pure: true
  esbuild: true
  prisma: true
  unrs-resolver: true
  vue-demi: true
